name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Verify build
        run: go build ./...

      - name: Run tests with race detection and coverage
        run: go test -race -cover ./...

      - name: Go vet
        run: go vet ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Install apko
        run: go install chainguard.dev/apko@latest

      - name: Validate apko configurations
        run: |
          # Verify apko files compile / parse cleanly
          apko build library/os/base/base.yaml base-test.tar --arch x86_64
          apko build library/os/tools/tools.yaml tools-test.tar --arch x86_64
          rm -f base-test.tar tools-test.tar

      - name: Build Agentbox CLI
        run: go build -o bin/agentbox ./cmd/agentbox

      - name: Validate Example Manifest (Dry Run)
        run: ./bin/agentbox build --dry-run -f examples/opencode-kimi/agentbox.yaml
