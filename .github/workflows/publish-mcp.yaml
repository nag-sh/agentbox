name: Publish MCP Servers

on:
  push:
    branches:
      - main
    paths:
      - 'library/mcp/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nag-sh/agentbox

jobs:
  build-mcp:
    name: Build and Push MCP Server
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install ORAS CLI
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, Package and Push
        run: |
          for dir in library/mcp/*; do
            if [ -d "$dir" ] && [ -f "$dir/mcp.yaml" ]; then
              NAME=$(grep -E "^name:" $dir/mcp.yaml | head -n 1 | awk '{print $2}')
              VERSION=$(grep -E "^version:" $dir/mcp.yaml | head -n 1 | awk '{print $2}')
              
              echo "Building MCP server: $NAME version $VERSION for ${{ matrix.arch }}"
              
              # Compile MCP server
              GOARCH_VAL=${{ matrix.arch }}
              CGO_ENABLED=0 GOOS=linux GOARCH=$GOARCH_VAL go build -o $dir/fetch-server $dir/server.go
              
              # Prepare stage directory
              mkdir -p stage-$NAME
              cp $dir/fetch-server stage-$NAME/
              cp $dir/mcp.yaml stage-$NAME/
              
              tar -czf stage-$NAME-${{ matrix.arch }}.tar.gz -C stage-$NAME .
              
              oras push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/mcp/$NAME:$VERSION-${{ matrix.arch }} \
                --artifact-type application/vnd.agentbox.mcp-server.v1+tar.gzip \
                stage-$NAME-${{ matrix.arch }}.tar.gz
                
              oras tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/mcp/$NAME:$VERSION-${{ matrix.arch }} latest-${{ matrix.arch }}
                
              # Clean up stage
              rm -rf stage-$NAME stage-$NAME-${{ matrix.arch }}.tar.gz $dir/fetch-server
            fi
          done
