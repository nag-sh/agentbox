contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle

entrypoint:
  command: /opt/agentbox/bin/agentbox-init

archs:
  - x86_64
  - aarch64

accounts:
  groups:
    - groupname: agentbox
      gid: 65532
  users:
    - username: agentbox
      uid: 65532
      gid: 65532
  run-as: 65532

paths:
  - path: /opt/agentbox/bin
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /opt/agentbox/config
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /workspace
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
